name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint_and_unit:
    name: Lint & Unit Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: dispatch_db
          MYSQL_USER: app
          MYSQL_PASSWORD: app
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uapp -papp --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: |
          ruff check .
          mypy hsp_dispatch_service

      - name: Unit test
        run: pytest tests/unit -q

  coverage_and_security:
    name: Coverage & Dependency Security
    runs-on: ubuntu-latest
    needs: lint_and_unit

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: dispatch_db
          MYSQL_USER: app
          MYSQL_PASSWORD: app
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uapp -papp --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Coverage
        run: pytest --cov=hsp_dispatch_service --cov-report=term-missing --cov-fail-under=70 -q

      - name: Security scan - bandit
        continue-on-error: true
        run: bandit -q -r hsp_dispatch_service

      - name: Security scan - pip-audit
        continue-on-error: true
        run: pip-audit

      - name: Security scan - trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table
          exit-code: "1"

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Snyk dependency scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test --severity-threshold=high --file=requirements-dev.txt --package-manager=pip

  build_and_scan_image:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    needs: coverage_and_security

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build docker image
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          REPO_NAME="${REPO_NAME,,}"
          docker build -t "local/${REPO_NAME}:${GITHUB_SHA}" .

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Snyk container scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          REPO_NAME="${REPO_NAME,,}"
          snyk container test "local/${REPO_NAME}:${GITHUB_SHA}" --severity-threshold=high

  push_image:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: build_and_scan_image
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build docker image
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          REPO_NAME="${REPO_NAME,,}"
          docker build -t "local/${REPO_NAME}:${GITHUB_SHA}" .

      - name: Login to Aliyun registry
        run: |
          echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login "${{ secrets.ALIYUN_REGISTRY }}" \
            --username "${{ secrets.ALIYUN_USERNAME }}" \
            --password-stdin

      - name: Push docker image to Aliyun
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          REPO_NAME="${REPO_NAME,,}"

          LOCAL_IMAGE="local/${REPO_NAME}:${GITHUB_SHA}"
          IMAGE_BASE="${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${REPO_NAME}"
          IMAGE_SHA="${IMAGE_BASE}:${GITHUB_SHA}"
          IMAGE_LATEST="${IMAGE_BASE}:latest"

          docker tag "${LOCAL_IMAGE}" "${IMAGE_SHA}"
          docker tag "${LOCAL_IMAGE}" "${IMAGE_LATEST}"

          docker push "${IMAGE_SHA}"
          docker push "${IMAGE_LATEST}"